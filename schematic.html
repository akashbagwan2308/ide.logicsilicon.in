        window.navigateUp = () => {
            if (hierarchyStack.length > 1) {
                hierarchyStack.pop(); 
                const parentMod = hierarchyStack.pop(); 
                dagGraph = buildGraphFromYosys(fullNetlist, parentMod);
                selectedNode = null; hoveredEdge = null; draggedEdge = null;
                updateBreadcrumbUI();
                fitCanvas();
            }
        };

        window.navigateDown = () => {
            const targetNodeId = selectedNode || hoveredNode;
            if (targetNodeId && dagGraph && fullNetlist) {
                const node = dagGraph.node(targetNodeId);
                if (node.type === 'instance') {
                    const modType = node.exactModuleType;
                    if (fullNetlist.modules[modType]) {
                        dagGraph = buildGraphFromYosys(fullNetlist, modType);
                        selectedNode = null; hoveredEdge = null; draggedEdge = null;
                        updateBreadcrumbUI();
                        fitCanvas();
                    } else {
                        alert("No internal hierarchy available for primitive: " + modType);
                    }
                } else {
                    alert("You can only travel down into an Instance block.");
                }
            } else {
                alert("Please click on a block to select it first, then click 'Down'.");
            }
        };

        function parseTestbenchRTL(tbCode, topModuleName) {
            const connections = [];
            const variables = {};

            const varRegex = /(?:logic|wire|reg|integer|int)\s+(?:\[(\d+):(\d+)\])?\s+([^;]+);/g;
            let varMatch;
            while ((varMatch = varRegex.exec(tbCode)) !== null) {
                const msb = varMatch[1] ? parseInt(varMatch[1]) : null;
                const lsb = varMatch[2] ? parseInt(varMatch[2]) : null;
                const declarations = varMatch[3].split(',');

                declarations.forEach(decl => {
                    const name = decl.split('=')[0].trim();
                    if (!name) return;

                    if (msb !== null && lsb !== null) {
                        variables[name] = { isVector: true, msb, lsb, bits: [] };
                        const step = msb > lsb ? -1 : 1;
                        for (let i = msb; msb > lsb ? i >= lsb : i <= lsb; i += step) {
                            variables[name].bits.push(`${name}[${i}]`);
                        }
                    } else {
                        variables[name] = { isVector: false, bits: [name] };
                    }
                });
            }

            const instRegex = new RegExp(`${topModuleName}\\s+\\w+\\s*\\(([\\s\\S]*?)\\);`, 'g');
            const instMatch = instRegex.exec(tbCode);

            if (instMatch) {
                const portMapString = instMatch[1];
                if (portMapString.trim() === '.*') {
                    return { type: 'implicit', variables };
                }

                const portRegex = /\.\s*(\w+)\s*\(\s*([^)\s]+)\s*\)/g;
                let portMatch;
                while ((portMatch = portRegex.exec(portMapString)) !== null) {
                    connections.push({
                        port: portMatch[1],
                        variable: portMatch[2]
                    });
                }
            }

            return { type: 'explicit', connections, variables };
        }

        function buildGraphFromYosys(netlist, targetModule) {
            const g = new dagre.graphlib.Graph({ compound: true, multigraph: true });
            g.setGraph({ rankdir: 'LR', align: 'UL', ranksep: 120, nodesep: 100, edgesep: 30 }); 
            g.setDefaultEdgeLabel(() => ({}));

            const modules = Object.keys(netlist.modules);
            if (modules.length === 0) throw new Error("No modules found in netlist");
            
            let topModuleName = targetModule;
            
            if (!topModuleName) {
                topModuleName = modules.find(m =>netlist.modules[m].attributes?.top !== undefined);
                if (!topModuleName) {
                    const instantiated = new Set();
                    modules.forEach(m => {
                        const cells = netlist.modules[m].cells || {};
                        Object.values(cells).forEach(c => instantiated.add(c.type));
                    });
                    const rootModules = modules.filter(m => {
                        if (instantiated.has(m)) return false;
                        const cells = netlist.modules[m].cells || {};
                        return Object.keys(cells).length > 0;
                    });
                    
                    if (rootModules.length === 1) {
                        topModuleName = rootModules[0];
                    } else if (rootModules.length > 1) {
                        topModuleName = rootModules.sort((a, b) => {
                            const countA = Object.keys(netlist.modules[a].cells || {}).length;
                            const countB = Object.keys(netlist.modules[b].cells || {}).length;
                            return countB - countA;
                        })[0];
                    } else {
                        topModuleName = modules.find(m => m.toLowerCase().includes("top")) || modules[0];
                    }
                }
            }
            
            if (hierarchyStack[hierarchyStack.length - 1] !== topModuleName) {
                hierarchyStack.push(topModuleName);
            }
            
            g.graph().name = topModuleName.replace('\\', ''); 

            const isTopLevel = (hierarchyStack.length <= 1);
            const includeTB = showTestbench && isTopLevel;

            const tbCode = sessionStorage.getItem('ls_tb_code') || ""; 
            const tbData = parseTestbenchRTL(tbCode, topModuleName.replace('\\', ''));

            const mod = netlist.modules[topModuleName];
            const bitDrivers = {}; 
            const placedTbVars = new Set(); 

            if (mod.ports) {
                for (const [portName, portData] of Object.entries(mod.ports)) {
                    const isInput = portData.direction === "input";
                    let portLabel = portName.replace('\\', '');
                    
                    const dynamicWidth = Math.max(50, portLabel.length * 8 + 20);
                    const isPortVector = portData.bits && portData.bits.length > 1;

                    if (isPortVector) {
                        g.setNode(portName, {
                            label: `[${portData.bits.length - 1}:0] ${portLabel}`,
                            baseName: portLabel,
                            type: isInput ? 'input' : 'output',
                            isVector: true, numBits: portData.bits.length,
                            width: Math.max(dynamicWidth, portData.bits.length * 20), height: 36,
                            inPorts: isInput ? [] : portData.bits.map((_, i) => `${portName}_${i}`),
                            outPorts: isInput ? portData.bits.map((_, i) => `${portName}_${i}`) : [],
                            flipH: false, flipV: false
                        });
                    } else {
                        g.setNode(portName, {
                            label: portLabel,
                            baseName: portLabel,
                            type: isInput ? 'input' : 'output',
                            isVector: false,
                            width: dynamicWidth, height: 36,
                            inPorts: isInput ? [] : [portName],
                            outPorts: isInput ? [portName] : [],
                            flipH: false, flipV: false
                        });
                    }

                    if (includeTB) {
                        let connectedVarName = portLabel; 
                        if (tbData.type === 'explicit') {
                            const explicitMap = tbData.connections.find(c => c.port === portLabel);
                            if (explicitMap) connectedVarName = explicitMap.variable;
                        }

                        const tbVarInfo = tbData.variables[connectedVarName];
                        const numBits = tbVarInfo ? tbVarInfo.bits.length : (portData.bits ? portData.bits.length : 1);

                        placedTbVars.add(connectedVarName);

                        if (isPortVector && numBits > 1) {
                            const tbNodeName = `tb_${connectedVarName}`;
                            
                            g.setNode(tbNodeName, {
                                label: connectedVarName,
                                baseName: connectedVarName,
                                type: 'tb_vector_component',
                                numBits: numBits,
                                width: numBits * 30, height: 36, 
                                inPorts: isInput ? [] : Array.from({length: numBits}, (_, i) => `${tbNodeName}_${i}`),
                                outPorts: isInput ? Array.from({length: numBits}, (_, i) => `${tbNodeName}_${i}`) : [],
                                flipH: false, flipV: false
                            });

                            for(let i=0; i<numBits; i++) {
                                if (isInput) {
                                    g.setEdge(tbNodeName, portName, { srcPortIdx: i, tgtPortIdx: i }, `${tbNodeName}_bit${i}_to_${portName}`);
                                } else {
                                    g.setEdge(portName, tbNodeName, { srcPortIdx: i, tgtPortIdx: i }, `${portName}_bit${i}_to_${tbNodeName}`);
                                }
                            }
                        } else {
                            const tbNodeName = `tb_${connectedVarName}`;
                            g.setNode(tbNodeName, {
                                label: connectedVarName, 
                                baseName: connectedVarName,
                                type: 'tb_component',
                                width: Math.max(44, connectedVarName.length * 8 + 10), height: 44,
                                inPorts: [], outPorts: [],
                                flipH: false, flipV: false
                            });

                            if (isInput) {
                                g.setEdge(tbNodeName, portName, { srcPortIdx: 0, tgtPortIdx: 0 }, `${tbNodeName}_to_${portName}`);
                            } else {
                                g.setEdge(portName, tbNodeName, { srcPortIdx: 0, tgtPortIdx: 0 }, `${portName}_to_${tbNodeName}`);
                            }
                        }
                    }

                    if (isInput) {
                        portData.bits.forEach((bit, idx) => { 
                            bitDrivers[bit] = { node: portName, portIdx: isPortVector ? idx : 0 }; 
                        });
                    }
                }
            }

            if (includeTB) {
                Object.keys(tbData.variables).forEach(varName => {
                    if (!placedTbVars.has(varName)) {
                        const varInfo = tbData.variables[varName];
                        const tbNodeName = `tb_internal_${varName}`;
                        
                        if (varInfo.isVector && varInfo.bits.length > 1) {
                            g.setNode(tbNodeName, {
                                label: varName, 
                                baseName: varName,
                                type: 'tb_vector_component', 
                                numBits: varInfo.bits.length,
                                width: varInfo.bits.length * 30, height: 36,
                                inPorts: [], outPorts: [], flipH: false, flipV: false
                            });
                        } else {
                            g.setNode(tbNodeName, {
                                label: varName, 
                                baseName: varName,
                                type: 'tb_component',
                                width: Math.max(44, varName.length * 8 + 10), height: 44,
                                inPorts: [], outPorts: [], flipH: false, flipV: false
                            });
                        }
                    }
                });
            }

            if (mod.cells) {
                for (const [cellName, cellData] of Object.entries(mod.cells)) {
                    let label = cellData.type;
                    let gateType = 'instance';
                    
                    const lType = label.toLowerCase();
                    if (lType.includes('nand')) gateType = 'nand';
                    else if (lType.includes('and')) gateType = 'and';
                    else if (lType.includes('xnor')) gateType = 'xnor';
                    else if (lType.includes('xor')) gateType = 'xor';
                    else if (lType.includes('nor')) gateType = 'nor';
                    else if (lType.includes('or')) gateType = 'or';
                    else if (lType.includes('not') || lType.includes('inv')) gateType = 'not';
                    else if (lType.includes('buf')) gateType = 'buf';

                    const cleanLabel = label.replace(/^\$_(.*)_$/g, '$1').replace(/^\$/g, '').replace('\\', '').toUpperCase();
                    const cleanName = cellData.hide_name ? '' : cellName.replace('\\', '');
                    const exactModuleType = cellData.type; 

                    const portDirs = cellData.port_directions || {};
                    if (!cellData.port_directions) {
                        for (const port of Object.keys(cellData.connections)) {
                            portDirs[port] = (port === 'Y' || port === 'Q' || port.includes('out') || port.includes('s') || port.includes('c') || port.includes('Sum') || port.includes('Carry')) ? 'output' : 'input';
                        }
                    }

                    const inPorts = Object.keys(portDirs).filter(p => portDirs[p] === 'input').sort();
                    const outPorts = Object.keys(portDirs).filter(p => portDirs[p] === 'output').sort();

                    let width = 120, height = 100;
                    if (gateType !== 'instance') { 
                        width = 60; height = 60; 
                    } else {
                        width = Math.max(120, cleanLabel.length * 10 + 20);
                        height = Math.max(100, Math.max(inPorts.length, outPorts.length) * 22 + 20);
                    }

                    g.setNode(cellName, {
                        label: cleanLabel, subLabel: cleanName, exactModuleType: exactModuleType,
                        type: gateType === 'instance' ? 'instance' : 'gate',
                        gateType: gateType, width: width, height: height,
                        inPorts: inPorts, outPorts: outPorts,
                        flipH: false, flipV: false
                    });

                    outPorts.forEach((port, idx) => {
                        cellData.connections[port].forEach(bit => { bitDrivers[bit] = { node: cellName, portIdx: idx }; });
                    });
                    cellData.resolved_port_directions = portDirs; 
                }
            }

            if (mod.cells) {
                for (const [cellName, cellData] of Object.entries(mod.cells)) {
                    const nodeData = g.node(cellName);
                    nodeData.inPorts.forEach((port, idx) => {
                        const driverGroups = {};
                        cellData.connections[port].forEach(bit => {
                            const driver = bitDrivers[bit];
                            if (driver && driver.node !== cellName) {
                                const key = `${driver.node}_${driver.portIdx}`;
                                if(!driverGroups[key]) driverGroups[key] = { node: driver.node, portIdx: driver.portIdx };
                            }
                        });
                        Object.values(driverGroups).forEach(grp => {
                            g.setEdge(grp.node, cellName, { 
                                srcPortIdx: grp.portIdx, tgtPortIdx: idx 
                            }, `${grp.node}_${cellName}_${port}_${grp.portIdx}`);
                        });
                    });
                }
            }
            
            if (mod.ports) {
                for (const [portName, portData] of Object.entries(mod.ports)) {
                    if (portData.direction === "output") {
                        const driverGroups = {};
                        portData.bits.forEach((bit, bitIdx) => {
                            const driver = bitDrivers[bit];
                            if (driver) {
                                const key = `${driver.node}_${driver.portIdx}`;
                                if(!driverGroups[key]) {
                                    driverGroups[key] = { node: driver.node, srcPortIdx: driver.portIdx, tgtPortIdx: (portData.bits.length > 1 ? bitIdx : 0) };
                                }
                            }
                        });
                        Object.values(driverGroups).forEach(grp => {
                            g.setEdge(grp.node, portName, { 
                                srcPortIdx: grp.srcPortIdx, tgtPortIdx: grp.tgtPortIdx
                            }, `${grp.node}_${portName}_${grp.srcPortIdx}`);
                        });
                    }
                }
            }

            dagre.layout(g);
            return g;
        }

        // ==========================================
        // 4. SAFEPATH MANHATTAN RENDERING 
        // ==========================================
        function resizeCanvas() {
            canvas.width = wrapper.getBoundingClientRect().width;
            canvas.height = wrapper.getBoundingClientRect().height;
            if(dagGraph) renderGraph();
        }

        function drawArrowhead(ctx, x, y, angle, size = 6, color) {
            ctx.save(); ctx.fillStyle = color; ctx.translate(x, y); ctx.rotate(angle);
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-size, size/1.5); ctx.lineTo(-size, -size/1.5);
            ctx.closePath(); ctx.fill(); ctx.restore();
        }

        function drawGate(ctx, x, y, w, h, type, colors, node) {
            ctx.beginPath();
            ctx.fillStyle = colors.gateBg;
            ctx.strokeStyle = colors.nodeBorder;
            ctx.lineWidth = 2;

            if (type === 'and' || type === 'nand') {
                ctx.moveTo(x, y);
                ctx.lineTo(x + w/2, y);
                ctx.arc(x + w/2, y + h/2, h/2, -Math.PI/2, Math.PI/2);
                ctx.lineTo(x, y + h);
                ctx.closePath();
                ctx.shadowColor = colors.shadow; ctx.shadowBlur = 8; ctx.shadowOffsetY = 4;
                ctx.fill(); ctx.shadowColor = 'transparent'; ctx.stroke();
            } 
            else if (type === 'or' || type === 'nor') {
                ctx.moveTo(x, y);
                ctx.quadraticCurveTo(x + w/2, y, x + w, y + h/2);
                ctx.quadraticCurveTo(x + w/2, y + h, x, y + h);
                ctx.quadraticCurveTo(x + 12, y + h/2, x, y);
                ctx.shadowColor = colors.shadow; ctx.shadowBlur = 8; ctx.shadowOffsetY = 4;
                ctx.fill(); ctx.shadowColor = 'transparent'; ctx.stroke();
                
                if (node && node.inPorts) {
                    ctx.beginPath();
                    node.inPorts.forEach((p, i) => {
                        const pinY = y + (i + 1) * (h / (node.inPorts.length + 1));
                        ctx.moveTo(x - 2, pinY);
                        ctx.lineTo(x + 12, pinY);
                    });
                    ctx.stroke();
                }
            } 
            else if (type === 'xor' || type === 'xnor') {
                const offset = 8;
                ctx.moveTo(x + offset, y);
                ctx.quadraticCurveTo(x + w/2 + offset/2, y, x + w, y + h/2);
                ctx.quadraticCurveTo(x + w/2 + offset/2, y + h, x + offset, y + h);
                ctx.quadraticCurveTo(x + 12 + offset, y + h/2, x + offset, y);
                ctx.shadowColor = colors.shadow; ctx.shadowBlur = 8; ctx.shadowOffsetY = 4;
                ctx.fill(); ctx.shadowColor = 'transparent'; ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.quadraticCurveTo(x + 12, y + h/2, x, y + h);
                ctx.stroke();
                
                if (node && node.inPorts) {
                    ctx.beginPath();
                    node.inPorts.forEach((p, i) => {
                        const pinY = y + (i + 1) * (h / (node.inPorts.length + 1));
                        ctx.moveTo(x - 2, pinY);
                        ctx.lineTo(x + 16, pinY);
                    });
                    ctx.stroke();
                }
            } 
            else { 
                const outX = type === 'not' ? (x + w - 8) : (x + w);
                ctx.moveTo(x, y); 
                ctx.lineTo(outX, y + h/2); 
                ctx.lineTo(x, y + h); 
                ctx.closePath();
                ctx.shadowColor = colors.shadow; ctx.shadowBlur = 8; ctx.shadowOffsetY = 4;
                ctx.fill(); ctx.shadowColor = 'transparent'; ctx.stroke();
            }

            if(type === 'nand' || type === 'nor' || type === 'xnor') {
                ctx.beginPath(); 
                ctx.arc(x + w + 4, y + h/2, 4, 0, 2*Math.PI); 
                ctx.fillStyle = colors.gateBg; 
                ctx.fill(); 
                ctx.stroke();
            } else if(type === 'not') {
                ctx.beginPath(); 
                ctx.arc(x + w - 4, y + h/2, 4, 0, 2*Math.PI); 
                ctx.fillStyle = colors.gateBg; 
                ctx.fill(); 
                ctx.stroke();
            }
        }

        function renderGraph() {
            if (!dagGraph) return;
            const colors = getColors();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save(); ctx.translate(panX, panY); ctx.scale(scale, scale);

            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity; 
            let tbMinX = Infinity, tbMinY = Infinity, tbMaxX = -Infinity, tbMaxY = -Infinity; 
            let hasInternalNodes = false;
            let hasTBNodes = false;
            
            dagGraph.nodes().forEach(v => {
                const node = dagGraph.node(v);
                if (!node || node.type === 'wire') return;

                tbMinX = Math.min(tbMinX, node.x - node.width/2);
                tbMinY = Math.min(tbMinY, node.y - node.height/2);
                tbMaxX = Math.max(tbMaxX, node.x + node.width/2);
                tbMaxY = Math.max(tbMaxY, node.y + node.height/2);

                if (node.type.startsWith('tb_')) {
                    hasTBNodes = true;
                } else {
                    hasInternalNodes = true;
                    minX = Math.min(minX, node.x - node.width/2);
                    minY = Math.min(minY, node.y - node.height/2);
                    maxX = Math.max(maxX, node.x + node.width/2);
                    maxY = Math.max(maxY, node.y + node.height/2);
                }
            });

            if (hasTBNodes) {
                const tbPad = 80;
                ctx.beginPath(); 
                ctx.rect(tbMinX - tbPad, tbMinY - tbPad, (tbMaxX - tbMinX) + tbPad*2, (tbMaxY - tbMinY) + tbPad*2);
                ctx.fillStyle = colors.bg; 
                ctx.strokeStyle = colors.nodeBorder; 
                ctx.lineWidth = 1; 
                ctx.stroke();
                
                ctx.fillStyle = colors.text; 
                ctx.font = 'bold 20px "Inter"'; 
                ctx.textAlign = 'left';
                ctx.fillText("test_bench", tbMinX - tbPad + 15, tbMinY - tbPad + 25);
            }

            if (hasInternalNodes) {
                const pad = hasTBNodes ? 40 : 60; 
                ctx.beginPath(); 
                ctx.roundRect(minX - pad, minY - pad, (maxX - minX) + pad*2, (maxY - minY) + pad*2, 16);
                ctx.fillStyle = colors.frameFill; 
                ctx.fill();
                ctx.strokeStyle = colors.frame; 
                ctx.lineWidth = 2; 
                if (!hasTBNodes) ctx.setLineDash([8, 6]); 
                ctx.stroke();
                ctx.setLineDash([]);
                
                ctx.fillStyle = colors.text; 
                ctx.font = 'bold 16px "Inter"'; 
                ctx.textAlign = 'center';
                ctx.fillText(dagGraph.graph().name || "top_module", (minX + maxX)/2, minY - pad + 20);
            }

            dagGraph.edges().forEach(e => {
                const edgeObj = dagGraph.edge(e);
                edgeObj.customOffset = edgeObj.customOffset || 0;
                
                const srcNode = dagGraph.node(e.v);
                const tgtNode = dagGraph.node(e.w);
                if(!srcNode || !tgtNode) return;

                const srcFlip = srcNode.flipH || false;
                const tgtFlip = tgtNode.flipH || false;

                let bubbleOffset = 0;
                if (['nand', 'nor', 'xnor'].includes(srcNode.gateType)) {
                    bubbleOffset = 8;
                } else if (srcNode.gateType === 'not') {
                    bubbleOffset = 0; 
                }
                
                let srcPinExt = 0;
                if (srcNode.type === 'instance' || srcNode.type === 'input' || srcNode.type === 'output') srcPinExt = 8;
                
                let startX = srcNode.x + (srcFlip ? -1 : 1) * (srcNode.width / 2 + bubbleOffset + srcPinExt);
                let startY = srcNode.y;
                
                if (srcNode.type === 'tb_vector_component' || srcNode.isVector) {
                    const bitWidth = srcNode.width / srcNode.numBits;
                    const visualIdx = srcNode.numBits - 1 - edgeObj.srcPortIdx;
                    startX = (srcNode.x - srcNode.width/2) + (visualIdx * bitWidth) + (bitWidth/2);
                    startY = srcNode.y + srcNode.height/2; 
                } else if (srcNode.outPorts && srcNode.outPorts.length > 0) {
                    let idx = srcNode.flipV ? (srcNode.outPorts.length - 1 - edgeObj.srcPortIdx) : edgeObj.srcPortIdx;
                    startY = (srcNode.y - srcNode.height/2) + (idx + 1) * (srcNode.height / (srcNode.outPorts.length + 1));
                }

                let tgtPinExt = 0;
                if (tgtNode.type === 'instance' || tgtNode.type === 'input' || tgtNode.type === 'output') tgtPinExt = 8;

                let endX = tgtNode.x + (tgtFlip ? 1 : -1) * (tgtNode.width / 2 + tgtPinExt);
                let endY = tgtNode.y;
                
                if (tgtNode.type === 'tb_vector_component' || tgtNode.isVector) {
                    const bitWidth = tgtNode.width / tgtNode.numBits;
                    const visualIdx = tgtNode.numBits - 1 - edgeObj.tgtPortIdx;
                    endX = (tgtNode.x - tgtNode.width/2) + (visualIdx * bitWidth) + (bitWidth/2);
                    endY = tgtNode.y + tgtNode.height/2;
                } else if (tgtNode.inPorts && tgtNode.inPorts.length > 0) {
                    let idx = tgtNode.flipV ? (tgtNode.inPorts.length - 1 - edgeObj.tgtPortIdx) : edgeObj.tgtPortIdx;
                    endY = (tgtNode.y - tgtNode.height/2) + (idx + 1) * (tgtNode.height / (tgtNode.inPorts.length + 1));
                }

                const spreadX = (srcNode.isVector || tgtNode.isVector) ? 0 : (edgeObj.srcPortIdx || 0) * 8;
                const spreadY = (srcNode.isVector || tgtNode.isVector) ? (edgeObj.tgtPortIdx || 0) * 10 : (edgeObj.tgtPortIdx || 0) * 8;

                ctx.beginPath();
                ctx.moveTo(startX, startY);

                const srcIsBottom = srcNode.type === 'tb_vector_component' || srcNode.isVector;
                const tgtIsBottom = tgtNode.type === 'tb_vector_component' || tgtNode.isVector;

                if (srcIsBottom && tgtIsBottom) {
                    const dropY = Math.max(startY, endY) + 30 + spreadY + edgeObj.customOffset;
                    ctx.lineTo(startX, dropY); ctx.lineTo(endX, dropY); ctx.lineTo(endX, endY);
                    edgeObj._hitSegment = { type: 'h', y: dropY, x1: startX, x2: endX };
                } else if (srcIsBottom && !tgtIsBottom) {
                    const dropY = startY + 30 + spreadY + edgeObj.customOffset;
                    const inX = endX + (tgtFlip ? 20 + spreadX : -20 - spreadX);
                    ctx.lineTo(startX, dropY); ctx.lineTo(inX, dropY); ctx.lineTo(inX, endY); ctx.lineTo(endX, endY);
                    edgeObj._hitSegment = { type: 'h', y: dropY, x1: startX, x2: inX };
                } else if (!srcIsBottom && tgtIsBottom) {
                    const outX = startX + (srcFlip ? -20 - spreadX : 20 + spreadX);
                    const dropY = endY + 30 + spreadY + edgeObj.customOffset;
                    ctx.lineTo(outX, startY); ctx.lineTo(outX, dropY); ctx.lineTo(endX, dropY); ctx.lineTo(endX, endY);
                    edgeObj._hitSegment = { type: 'h', y: dropY, x1: outX, x2: endX };
                } else {
                    const outX = startX + (srcFlip ? -20 - spreadX : 20 + spreadX);
                    ctx.lineTo(outX, startY);
                    const inX = endX + (tgtFlip ? 20 + spreadX : -20 - spreadX);

                    let hitSegment = null;

                    if (!srcFlip && !tgtFlip && outX < inX) {
                        let midX = outX + (inX - outX) / 2 + edgeObj.customOffset;
                        ctx.lineTo(midX, startY); ctx.lineTo(midX, endY);
                        hitSegment = { type: 'v', x: midX, y1: startY, y2: endY };
                    } else if (srcFlip && tgtFlip && outX > inX) {
                        let midX = outX + (inX - outX) / 2 + edgeObj.customOffset;
                        ctx.lineTo(midX, startY); ctx.lineTo(midX, endY);
                        hitSegment = { type: 'v', x: midX, y1: startY, y2: endY };
                    } else {
                        const goUp = startY >= endY;
                        const baseClearanceY = goUp ? (endY - 40 - spreadY) : (endY + 40 + spreadY);
                        let clearanceY = baseClearanceY + edgeObj.customOffset;
                        ctx.lineTo(outX, clearanceY); ctx.lineTo(inX, clearanceY); ctx.lineTo(inX, endY);
                        hitSegment = { type: 'h', y: clearanceY, x1: outX, x2: inX };
                    }

                    edgeObj._hitSegment = hitSegment; 
                    ctx.lineTo(endX, endY);
                }
                
                // --- WIRE COLOR CODING LOGIC ---
                let wireBaseColor = colors.wire;
                let simNode = getNodeValueFormatted(srcNode);
                let checkIdx = edgeObj.srcPortIdx || 0;

                // Fallback to target node if source mapping fails
                if (!simNode || simNode.val === undefined) {
                    simNode = getNodeValueFormatted(tgtNode);
                    checkIdx = edgeObj.tgtPortIdx || 0;
                }

                if (simNode && simNode.val) {
                    let valStr = simNode.val;
                    let charIdx = valStr.length - 1 - checkIdx;
                    let bitChar = valStr[charIdx] !== undefined ? valStr[charIdx] : valStr[0];

                    if (bitChar === '1') {
                        wireBaseColor = colors.val1; // Blue
                    } else if (bitChar.toLowerCase() === 'x') {
                        wireBaseColor = colors.valX; // Red
                    } else if (bitChar.toLowerCase() === 'z') {
                        wireBaseColor = colors.valZ; // Amber/Light Orange
                    }
                    // '0' uses default no color (colors.wire)
                }

                if (hoveredEdge === e || draggedEdge === e) {
                    ctx.strokeStyle = colors.wireHover; 
                    ctx.lineWidth = 3.5; 
                } else {
                    ctx.strokeStyle = wireBaseColor; 
                    ctx.lineWidth = 2.5; 
                }
                
                ctx.stroke();
                
                if (tgtNode.type === 'tb_vector_component' || tgtNode.isVector) {
                    drawArrowhead(ctx, endX, endY, -Math.PI/2, 6, ctx.strokeStyle);
                } else if (tgtNode.type !== 'gate') {
                    drawArrowhead(ctx, endX, endY, tgtFlip ? Math.PI : 0, 6, ctx.strokeStyle);
                }
            });

            // 3. Update Node Drawing
            dagGraph.nodes().forEach(v => {
                const node = dagGraph.node(v);
                if (node.type === 'wire') return; 

                const w = node.width; const h = node.height;
                const w2 = w/2; const h2 = h/2;

                ctx.save();
                ctx.translate(node.x, node.y);
                ctx.scale(node.flipH ? -1 : 1, node.flipV ? -1 : 1);
                
                ctx.fillStyle = (node.type === 'input' || node.type === 'output' || node.type.startsWith('tb_')) ? colors.ioBg : colors.gateBg;
                
                if (selectedNode === v) {
                    ctx.strokeStyle = colors.selected;
                    ctx.lineWidth = 3;
                } else if (hoveredNode === v) {
                    ctx.strokeStyle = colors.wireHover;
                    ctx.lineWidth = 2.5;
                } else {
                    ctx.strokeStyle = colors.nodeBorder;
                    ctx.lineWidth = 2;
                }

                if (node.type === 'gate') {
                    drawGate(ctx, -w2, -h2, w, h, node.gateType, colors, node);
                } else if (node.type === 'tb_vector_component' || node.isVector) {
                    const bitWidth = w / node.numBits;
                    ctx.beginPath(); ctx.rect(-w2, -h2, w, h);
                    ctx.shadowColor = colors.shadow; ctx.shadowBlur = 6; ctx.shadowOffsetY = 2;
                    ctx.fill(); ctx.shadowColor = 'transparent'; ctx.stroke();
                    
                    ctx.beginPath();
                    for(let i = 1; i < node.numBits; i++) {
                        ctx.moveTo(-w2 + i * bitWidth, -h2);
                        ctx.lineTo(-w2 + i * bitWidth, h2);
                    }
                    ctx.stroke();
                } else if (node.type === 'tb_component') {
                    ctx.beginPath(); ctx.rect(-w2, -h2, w, h);
                    ctx.shadowColor = colors.shadow; ctx.shadowBlur = 6; ctx.shadowOffsetY = 2;
                    ctx.fill(); ctx.shadowColor = 'transparent'; ctx.stroke();
                } else {
                    ctx.beginPath(); ctx.roundRect(-w2, -h2, w, h, 6);
                    ctx.shadowColor = colors.shadow; ctx.shadowBlur = 10; ctx.shadowOffsetY = 4;
                    ctx.fill(); ctx.shadowColor = 'transparent'; ctx.stroke();
                }

                ctx.strokeStyle = colors.nodeBorder;
                ctx.lineWidth = 2;
                ctx.beginPath();
                if (node.inPorts && !node.isVector && !node.type.startsWith('tb_') && node.type !== 'gate') {
                    node.inPorts.forEach((p, i) => {
                        const pinY = -h2 + (i + 1) * (h / (node.inPorts.length + 1));
                        ctx.moveTo(-w2 - 8, pinY);
                        ctx.lineTo(-w2, pinY);
                    });
                }
                if (node.outPorts && !node.isVector && !node.type.startsWith('tb_') && node.type !== 'gate') {
                    node.outPorts.forEach((p, i) => {
                        const pinY = -h2 + (i + 1) * (h / (node.outPorts.length + 1));
                        ctx.moveTo(w2, pinY);
                        ctx.lineTo(w2 + 8, pinY);
                    });
                }
                ctx.stroke();

                ctx.restore(); // Undo flip/scale for perfect text rendering

                // 4. Update Text Labels and Exact Binary Bit Placement
                ctx.fillStyle = colors.text; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                
                const isBoxNode = node.type === 'input' || node.type === 'output' || node.type === 'tb_component' || node.type === 'tb_vector_component';

                if (isBoxNode) {
                    ctx.font = 'bold 13px "JetBrains Mono"';
                    ctx.fillStyle = colors.text;
                    ctx.fillText(node.label, node.x, node.y - node.height/2 - 14);

                    // Fetch the live simulated value mapped exactly to the time slider
                    const simNode = getNodeValueFormatted(node);
                    
                    // Fallback string if mapping fails so user knows it's empty
                    let valString = simNode ? simNode.val : "?".repeat(node.numBits || 1);
                    let targetSize = node.numBits || 1;
                    
                    ctx.font = 'bold 16px "Fira Code", monospace';
                    
                    if (node.isVector || node.type === 'tb_vector_component') {
                        const bitWidth = node.width / targetSize;
                        
                        // Iterate to drop exactly one bit in the dead-center of each subdivider box
                        for (let i = 0; i < targetSize; i++) {
                            let bitChar = valString[i] || '?';
                            let bitCenterX = node.x - node.width/2 + (i * bitWidth) + (bitWidth / 2);
                            
                            if (bitChar === '?') ctx.fillStyle = colors.text; 
                            else if (bitChar.toLowerCase() === 'x') ctx.fillStyle = colors.valX;
                            else if (bitChar.toLowerCase() === 'z') ctx.fillStyle = colors.valZ;
                            else if (bitChar === '1') ctx.fillStyle = colors.val1;
                            else ctx.fillStyle = colors.val0;

                            ctx.fillText(bitChar, bitCenterX, node.y + 1);
                        }
                    } else {
                        // Scalar (1-bit) drops directly in center
                        let bitChar = valString[0] || '?';
                        if (bitChar === '?') ctx.fillStyle = colors.text; 
                        else if (bitChar.toLowerCase() === 'x') ctx.fillStyle = colors.valX;
                        else if (bitChar.toLowerCase() === 'z') ctx.fillStyle = colors.valZ;
                        else if (bitChar === '1') ctx.fillStyle = colors.val1;
                        else ctx.fillStyle = colors.val0;

                        ctx.fillText(bitChar, node.x, node.y + 1);
                    }
                    
                } else if (node.type === 'instance') {
                    ctx.font = 'bold 16px "Inter"'; ctx.fillText(node.label, node.x, node.y - 14);
                    ctx.font = '13px "JetBrains Mono"'; ctx.fillStyle = colors.nodeBorder; ctx.fillText(node.subLabel, node.x, node.y + 16);
                } else if (node.type === 'gate') {
                    ctx.font = 'bold 12px "JetBrains Mono"'; 
                    if (hoveredNode === v || selectedNode === v) ctx.fillText(node.subLabel, node.x, node.y - 25);
                }
            });

            ctx.restore();
        }

        // ==========================================
        // 5. INTERACTIVITY & WIRE DRAGGING
        // ==========================================
        
        wrapper.addEventListener('dblclick', (e) => {
            // STOP THE BUBBLING POPUP BUG HERE
            if (e.target.closest('#bottom-time-widget')) return; 
            navigateDown();
        });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace') {
                navigateUp();
                return;
            }
            if (e.key === 'Enter') {
                navigateDown();
                return;
            }
            
            const activeNode = selectedNode || hoveredNode;
            if (activeNode && dagGraph) {
                const node = dagGraph.node(activeNode);
                if (e.key.toLowerCase() === 'h') { node.flipH = !node.flipH; renderGraph(); }
                if (e.key.toLowerCase() === 'v') { node.flipV = !node.flipV; renderGraph(); }
            }
        });

        wrapper.addEventListener('wheel', (e) => { 
            e.preventDefault(); 
            zoomCanvas(e.deltaY > 0 ? 0.9 : 1.1, e.clientX - wrapper.offsetLeft, e.clientY - wrapper.offsetTop); 
        });

        window.zoomCanvas = (amt, cx = canvas.width/2, cy = canvas.height/2) => { 
            const nS = scale * amt; 
            if (nS >= 0.2 && nS <= 5) { 
                panX = cx - (cx - panX) * amt; 
                panY = cy - (cy - panY) * amt; 
                scale = nS; 
                renderGraph(); 
            } 
        }

        window.fitCanvas = () => { 
            if(!dagGraph) return;
            const graphW = dagGraph.graph().width || 800; 
            const graphH = dagGraph.graph().height || 600; 
            const cw = canvas.width; 
            const ch = canvas.height;
            scale = Math.min((cw - 160) / graphW, (ch - 160) / graphH); 
            if (scale > 1.5) scale = 1.5;
            panX = (cw - (graphW * scale)) / 2; 
            panY = (ch - (graphH * scale)) / 2; 
            renderGraph(); 
        }
        
        let isDraggingCanvas = false;
        let startDragX = 0, startDragY = 0;
        let draggedNode = null;
        let dragOffsetX = 0, dragOffsetY = 0;

        wrapper.addEventListener('mousedown', (e) => { 
            // PREVENT DRAGGING WHEN CLICKING WIDGET
            if (e.target.closest('#bottom-time-widget')) return;

            const rect = canvas.getBoundingClientRect();
            const mx = (e.clientX - rect.left - panX) / scale;
            const my = (e.clientY - rect.top - panY) / scale;
            
            let clickedNode = null;
            if(dagGraph) {
                const nodes = dagGraph.nodes();
                for(let i = nodes.length - 1; i >= 0; i--) {
                    const v = nodes[i];
                    const node = dagGraph.node(v); 
                    if (node.type === 'wire') continue;
                    
                    const nx = node.x - node.width / 2; 
                    const ny = node.y - node.height / 2;
                    if (mx >= nx && mx <= nx + node.width && my >= ny && my <= ny + node.height) {
                        clickedNode = v;
                        break;
                    }
                }
            }

            if (clickedNode) {
                draggedNode = clickedNode;
                selectedNode = clickedNode; 
                const node = dagGraph.node(draggedNode);
                dragOffsetX = mx - node.x;
                dragOffsetY = my - node.y;
                wrapper.style.cursor = 'grabbing';
                renderGraph(); 
            } else if (hoveredEdge) {
                draggedEdge = hoveredEdge;
                const edge = dagGraph.edge(draggedEdge);
                dragEdgeStartOffset = edge.customOffset || 0;
                startDragX = mx;
                startDragY = my;
            } else {
                isDraggingCanvas = true; 
                selectedNode = null; 
                startDragX = e.clientX - panX; 
                startDragY = e.clientY - panY; 
                wrapper.style.cursor = 'grab';
                renderGraph(); 
            }
        });

        window.addEventListener('mouseup', () => { 
            isDraggingCanvas = false; 
            draggedNode = null;
            draggedEdge = null;
            wrapper.style.cursor = 'default';
            renderGraph();
        });

        wrapper.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mx = (e.clientX - rect.left - panX) / scale;
            const my = (e.clientY - rect.top - panY) / scale;

            if (isDraggingCanvas) { 
                panX = e.clientX - startDragX; 
                panY = e.clientY - startDragY; 
                renderGraph(); 
            } else if (draggedNode) {
                const node = dagGraph.node(draggedNode);
                node.x = mx - dragOffsetX;
                node.y = my - dragOffsetY;
                
                node.x = Math.round(node.x / 20) * 20;
                node.y = Math.round(node.y / 20) * 20;

                renderGraph();
            } else if (draggedEdge) {
                const edge = dagGraph.edge(draggedEdge);
                const seg = edge._hitSegment;
                if (!seg) return;
                
                if (seg.type === 'v') {
                    edge.customOffset = dragEdgeStartOffset + (mx - startDragX);
                } else {
                    edge.customOffset = dragEdgeStartOffset + (my - startDragY);
                }
                renderGraph();
            } else {
                if(!dagGraph) return;
                let foundNode = null;
                let foundEdge = null;
                
                dagGraph.nodes().forEach(v => {
                    const node = dagGraph.node(v); 
                    if (node.type === 'wire') return;
                    const nx = node.x - node.width / 2; 
                    const ny = node.y - node.height / 2;
                    if (mx >= nx && mx <= nx + node.width && my >= ny && my <= ny + node.height) {
                        foundNode = v;
                        
                        const wrapperRect = wrapper.getBoundingClientRect();
                        tooltip.style.left = (e.clientX - wrapperRect.left + 15) + 'px'; 
                        tooltip.style.top = (e.clientY - wrapperRect.top + 15) + 'px';
                        
                        const hlColor = isDarkMode ? '#fde047' : '#eab308';
                        const subColor = isDarkMode ? '#22d3ee' : '#0284c7';

                        let tipText = `<span style="color:${hlColor}; font-weight:bold;">Ref:</span> ${node.subLabel || node.label}<br><span style="color:${hlColor}; font-weight:bold;">Type:</span> ${node.type === 'gate' ? node.gateType.toUpperCase() : 'Module'}`;
                        if (node.type === 'instance') tipText += `<br><span style="color:${subColor}; font-size:9px;">(Select and click 'Down' to enter)</span>`;
                        
                        tooltip.innerHTML = tipText;
                        tooltip.style.display = 'block';
                    }
                });

                if (!foundNode) {
                    dagGraph.edges().forEach(e => {
                        const edgeObj = dagGraph.edge(e);
                        const seg = edgeObj._hitSegment;
                        if (seg) {
                            if (seg.type === 'v') {
                                if (Math.abs(mx - seg.x) < 12 && my >= Math.min(seg.y1, seg.y2) - 5 && my <= Math.max(seg.y1, seg.y2) + 5) foundEdge = e;
                            } else {
                                if (Math.abs(my - seg.y) < 12 && mx >= Math.min(seg.x1, seg.x2) - 5 && mx <= Math.max(seg.x1, seg.x2) + 5) foundEdge = e;
                            }
                        }
                    });
                }
                
                let needsRender = false;

                if (foundNode !== hoveredNode) { hoveredNode = foundNode; needsRender = true; }
                if (foundEdge !== hoveredEdge) { hoveredEdge = foundEdge; needsRender = true; }
                
                if (hoveredNode) {
                    wrapper.style.cursor = 'pointer';
                } else if (hoveredEdge) {
                    const seg = dagGraph.edge(hoveredEdge)._hitSegment;
                    wrapper.style.cursor = seg.type === 'v' ? 'col-resize' : 'row-resize';
                    tooltip.style.display = 'none';
                } else {
                    wrapper.style.cursor = 'default';
                    tooltip.style.display = 'none';
                }

                if (needsRender) renderGraph();
            }
        });
