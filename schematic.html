<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogicSilicon | Schematic Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dagre/0.8.5/dagre.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; transition: background-color 0.3s, color 0.3s; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }

        #h-resizer { width: 6px; cursor: col-resize; position: relative; z-index: 10; transition: background-color 0.2s; }
        #h-resizer:hover, #h-resizer.active { background-color: #fde047 !important; }

        #canvas-wrapper { background-color: #ffffff; background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 20px 20px; transition: background-color 0.3s; }
        .dark #canvas-wrapper { background-color: #0b1120; background-image: radial-gradient(#1e293b 1px, transparent 1px); }

        #schematic-tooltip { position: absolute; pointer-events: none; padding: 6px 12px; border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 11px; z-index: 100; display: none; white-space: pre; transition: background-color 0.2s, border-color 0.2s, color 0.2s; }
        #schematic-tooltip { background: rgba(255, 255, 255, 0.95); color: #0f172a; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 1px solid #cbd5e1; }
        .dark #schematic-tooltip { background: rgba(15, 23, 42, 0.95); color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.6); border: 1px solid #334155; }
    </style>
</head>
<body class="flex flex-col h-screen antialiased bg-slate-50 text-slate-900 dark:bg-[#0f172a] dark:text-slate-50">

    <div style="font-family: 'JetBrains Mono', monospace; position: absolute; left: -9999px; visibility: hidden;">preload</div>

    <header class="h-14 bg-white dark:bg-[#1e293b] border-b border-slate-200 dark:border-[#334155] flex items-center justify-between px-4 shrink-0 z-20 shadow-sm dark:shadow-md transition-colors">
        <div class="flex items-center gap-4">
            <div class="w-8 h-8 bg-slate-800 dark:bg-slate-700 text-white rounded-md flex items-center justify-center font-black text-sm shadow-md">LS</div>
            <h1 class="font-bold text-slate-800 dark:text-slate-200 tracking-tight flex items-center gap-2">
                Schematic Viewer<span class="bg-amber-100 text-amber-700 border-amber-200 dark:bg-yellow-400/10 dark:text-yellow-400 border dark:border-yellow-400/20 px-1.5 py-0.5 rounded text-[10px] uppercase tracking-wider font-bold">V10 Elite</span>
            </h1>
        </div>
        
        <div class="flex items-center gap-2">
            <span class="text-[11px] text-slate-500 dark:text-slate-400 mr-2 font-mono hidden xl:block">
                Drag Nodes & Wires | Keys: <kbd class="bg-slate-100 border border-slate-200 dark:border-none dark:bg-slate-700 px-1 rounded text-slate-700 dark:text-slate-200">H</kbd> <kbd class="bg-slate-100 border border-slate-200 dark:border-none dark:bg-slate-700 px-1 rounded text-slate-700 dark:text-slate-200">V</kbd> = Flip
            </span>
            
            <div class="w-px h-5 bg-slate-200 dark:bg-[#334155] mx-1"></div>

            <button onclick="toggleEditor()" id="btn-toggle-editor" class="flex items-center gap-1.5 px-3 py-1.5 rounded hover:bg-slate-100 dark:hover:bg-[#334155] text-slate-600 dark:text-slate-300 hover:text-slate-900 dark:hover:text-white text-xs font-bold transition-colors bg-white dark:bg-[#0f172a] border border-slate-200 dark:border-[#334155]" title="Toggle Code Editor">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                <span>Source Code</span>
            </button>
            
            <div class="w-px h-5 bg-slate-200 dark:bg-[#334155] mx-1"></div>
            
            <button onclick="navigateUp()" class="flex items-center gap-1 px-3 py-1.5 rounded hover:bg-slate-100 dark:hover:bg-[#334155] text-slate-600 dark:text-slate-300 hover:text-slate-900 dark:hover:text-white text-xs font-bold transition-colors" title="Go up to parent module">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"></path></svg> Up
            </button>
            <button onclick="navigateDown()" class="flex items-center gap-1 px-3 py-1.5 rounded hover:bg-slate-100 dark:hover:bg-[#334155] text-slate-600 dark:text-slate-300 hover:text-slate-900 dark:hover:text-white text-xs font-bold transition-colors" title="Enter selected module">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg> Down
            </button>

            <div class="w-px h-5 bg-slate-200 dark:bg-[#334155] mx-1"></div>
            
            <button onclick="zoomCanvas(1.2)" class="w-8 h-8 flex items-center justify-center rounded hover:bg-slate-100 dark:hover:bg-[#334155] text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors" title="Zoom In">➕</button>
            <button onclick="zoomCanvas(0.8)" class="w-8 h-8 flex items-center justify-center rounded hover:bg-slate-100 dark:hover:bg-[#334155] text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors" title="Zoom Out">➖</button>
            <button onclick="fitCanvas()" class="px-3 py-1.5 rounded hover:bg-slate-100 dark:hover:bg-[#334155] text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white text-xs font-bold transition-colors" title="Fit to Screen">⛶ Fit</button>
            
            <button onclick="toggleTheme()" class="w-8 h-8 flex items-center justify-center rounded hover:bg-slate-100 dark:hover:bg-[#334155] text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors ml-1" title="Toggle Theme">🌓</button>
            <button onclick="triggerSynthesis()" class="ml-2 px-4 py-1.5 bg-slate-800 hover:bg-slate-700 dark:bg-slate-700 dark:hover:bg-slate-600 text-white rounded-lg text-xs font-bold transition-colors shadow-md flex items-center gap-2">
                ⚡ Resync
            </button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden w-full relative">
        
        <div id="editor-pane" class="hidden flex-col w-1/3 min-w-[300px] bg-white dark:bg-[#0f172a] z-10 border-r border-slate-200 dark:border-[#334155] transition-colors">
            <div class="h-9 bg-slate-50 dark:bg-[#1e293b] border-b border-slate-200 dark:border-[#334155] flex items-center justify-between px-4 shrink-0 transition-colors">
                <span class="text-xs font-bold text-slate-500 dark:text-slate-400 font-mono flex items-center gap-2">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    design.sv
                </span>
                <button onclick="toggleEditor()" class="text-slate-400 hover:text-slate-700 dark:text-slate-500 dark:hover:text-white transition-colors" title="Close Editor">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div id="monaco-container" class="flex-1 w-full relative"></div>
        </div>

        <div id="h-resizer" class="hidden items-center justify-center z-10 bg-slate-200 dark:bg-[#1e293b]">
            <div class="w-1 h-8 bg-slate-400 dark:bg-[#475569] rounded-full"></div>
        </div>

        <div id="canvas-pane" class="flex-1 w-full h-full relative flex flex-col bg-slate-100 dark:bg-[#0b1120] transition-colors">
            <div class="h-9 bg-slate-50 dark:bg-[#1e293b] border-b border-slate-200 dark:border-[#334155] flex items-center justify-between px-4 shrink-0 z-10 shadow-sm relative transition-colors">
                <div id="breadcrumb-container" class="flex items-center gap-1.5 text-xs font-bold font-mono text-slate-600 dark:text-slate-300 hidden"></div>
                <span id="render-status" class="absolute right-4 text-[10px] text-amber-500 dark:text-amber-400 font-bold uppercase tracking-wider bg-amber-100 dark:bg-amber-400/10 px-2 py-0.5 rounded border border-amber-200 dark:border-amber-400/20">Waiting...</span>
            </div>
            <div id="canvas-wrapper" class="flex-1 w-full relative overflow-hidden">
                <canvas id="schematic-canvas" class="absolute top-0 left-0 w-full h-full"></canvas>
                <div id="schematic-tooltip"></div>
            </div>
        </div>
    </main>

    <script>
        // ==========================================
        // 1. STATE & HIGH CONTRAST THEME
        // ==========================================
        let isDarkMode = true;
        let editorInstance = null;
        let isEditorVisible = false;
        let dagGraph = null; 
        let fullNetlist = null;
        let hierarchyStack = [];
        
        const canvas = document.getElementById('schematic-canvas');
        const ctx = canvas.getContext('2d');
        const tooltip = document.getElementById('schematic-tooltip');
        const wrapper = document.getElementById('canvas-wrapper');
        
        let panX = 100, panY = 100, scale = 1;
        let hoveredNode = null;
        let selectedNode = null; 

        // NEW: Wire Drag State
        let hoveredEdge = null;
        let draggedEdge = null;
        let dragEdgeStartOffset = 0;

        function getColors() {
            return isDarkMode ? {
                bg: '#0b1120', 
                nodeBg: '#0f172a',      
                nodeBorder: '#f8fafc',  
                text: '#f8fafc',        
                wire: '#f8fafc',        
                wireHover: '#22d3ee',   
                ioBg: '#1e293b', 
                gateBg: '#0f172a', 
                shadow: 'rgba(0,0,0,0.8)', 
                frame: '#475569', 
                pin: '#f8fafc',         
                selected: '#fde047',    
                frameFill: 'rgba(15, 23, 42, 0.4)'
            } : {
                bg: '#ffffff', 
                nodeBg: '#ffffff', 
                nodeBorder: '#334155',  
                text: '#0f172a', 
                wire: '#475569',        
                wireHover: '#0ea5e9',   
                ioBg: '#f8fafc', 
                gateBg: '#ffffff', 
                shadow: 'rgba(0,0,0,0.08)', 
                frame: '#cbd5e1', 
                pin: '#334155',
                selected: '#eab308',    
                frameFill: 'rgba(241, 245, 249, 0.6)' 
            };
        }

        function toggleTheme() {
            isDarkMode = !isDarkMode;
            document.documentElement.classList.toggle('dark', isDarkMode);
            if(editorInstance) monaco.editor.setTheme(isDarkMode ? 'vs-dark' : 'vs'); 
            renderGraph();
        }

        function toggleEditor() {
            isEditorVisible = !isEditorVisible;
            const pane = document.getElementById('editor-pane');
            const resizer = document.getElementById('h-resizer');
            const btn = document.getElementById('btn-toggle-editor');

            if (isEditorVisible) {
                pane.classList.remove('hidden'); pane.classList.add('flex');
                resizer.classList.remove('hidden'); resizer.classList.add('flex');
                btn.classList.add('bg-slate-100', 'dark:bg-slate-800', 'border-slate-300', 'dark:border-slate-600');
                btn.classList.remove('bg-white', 'dark:bg-[#0f172a]', 'border-slate-200', 'dark:border-[#334155]');
            } else {
                pane.classList.add('hidden'); pane.classList.remove('flex');
                resizer.classList.add('hidden'); resizer.classList.remove('flex');
                btn.classList.remove('bg-slate-100', 'dark:bg-slate-800', 'border-slate-300', 'dark:border-slate-600');
                btn.classList.add('bg-white', 'dark:bg-[#0f172a]', 'border-slate-200', 'dark:border-[#334155]');
            }

            setTimeout(() => {
                resizeCanvas();
                if (editorInstance) editorInstance.layout();
            }, 10);
        }

        // ==========================================
        // 2. MONACO INITIALIZATION 
        // ==========================================
        window.onload = () => {
            const passedCode = sessionStorage.getItem('ls_rtl_code') || "// Paste your Verilog code here";

            document.fonts.ready.then(() => {
                require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs' }});
                require(['vs/editor/editor.main'], function() {
                    editorInstance = monaco.editor.create(document.getElementById('monaco-container'), {
                        value: passedCode, 
                        language: 'verilog', 
                        theme: isDarkMode ? 'vs-dark' : 'vs', 
                        automaticLayout: true, minimap: { enabled: false }, fontSize: 13,
                        fontFamily: "'JetBrains Mono', monospace",
                        fontLigatures: true
                    });
                    
                    setTimeout(() => {
                        monaco.editor.remeasureFonts();
                        if (editorInstance) editorInstance.layout();
                    }, 150);
                    
                    editorInstance.onDidChangeModelContent(() => {
                        document.getElementById('render-status').innerText = 'Unsynced';
                        document.getElementById('render-status').className = 'absolute right-4 text-[10px] text-amber-500 dark:text-amber-400 font-bold uppercase tracking-wider bg-amber-100 dark:bg-amber-400/10 px-2 py-0.5 rounded border border-amber-200 dark:border-amber-400/20';
                    });
                });
            });

            setTimeout(triggerSynthesis, 200);
            window.addEventListener('resize', resizeCanvas);
            setTimeout(resizeCanvas, 300);
        };

        let isResizingH = false;
        document.getElementById('h-resizer').addEventListener('mousedown', (e) => { isResizingH = true; document.body.style.cursor = 'col-resize'; e.preventDefault(); });
        document.addEventListener('mousemove', (e) => {
            if (isResizingH && isEditorVisible) {
                const newWidth = (e.clientX / document.body.clientWidth) * 100;
                if (newWidth > 20 && newWidth < 80) document.getElementById('editor-pane').style.width = newWidth + '%';
            }
        });
        document.addEventListener('mouseup', () => {
            if (isResizingH) { 
                isResizingH = false; 
                document.body.style.cursor = 'default'; 
                if (editorInstance) editorInstance.layout();
                resizeCanvas(); 
            }
        });

        // ==========================================
        // 3. API & SMART HIERARCHY ENGINE
        // ==========================================
        async function triggerSynthesis() {
            const code = editorInstance ? editorInstance.getValue() : (sessionStorage.getItem('ls_rtl_code') || "");
            const statusEl = document.getElementById('render-status');
            
            // 1. Grab the token from session storage
            const token = sessionStorage.getItem('ls_jwt_token');
            if (!token) {
                alert("Security Error: No active session. Please log in from the main playground.");
                return;
            }

            if (!code || code.trim() === "") {
                statusEl.innerText = 'No code found';
                return;
            }

            statusEl.innerText = 'Synthesizing...';
            statusEl.className = 'absolute right-4 text-[10px] text-sky-600 dark:text-sky-400 font-bold uppercase tracking-wider bg-sky-100 dark:bg-sky-400/10 px-2 py-0.5 rounded border border-sky-200 dark:border-sky-400/20';

            try {
                // 2. Attach the token to the fetch request headers
                const response = await fetch('https://schematic-backend.onrender.com/api/synthesize', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` // <--- The VIP Pass
                    },
                    body: JSON.stringify({ code: code })
                });
                
                const data = await response.json();
                
                // 3. Catch security rejections from the backend
                if (response.status === 401 || response.status === 403) {
                    throw new Error("UNAUTHORIZED: " + (data.error || "Invalid token."));
                }
                
                if (data.status === "success") {
                    fullNetlist = data.netlist;
                    hierarchyStack = []; 
                    selectedNode = null; 
                    dagGraph = buildGraphFromYosys(fullNetlist, null);
                    
                    statusEl.innerText = 'SYNCED';
                    statusEl.className = 'absolute right-4 text-[10px] text-emerald-600 dark:text-emerald-400 font-bold uppercase tracking-wider bg-emerald-100 dark:bg-emerald-400/10 px-2 py-0.5 rounded border border-emerald-200 dark:border-emerald-400/20';
                    updateBreadcrumbUI();
                    fitCanvas();
                } else {
                    throw new Error(data.details || data.error || "Backend Synthesis Failed");
                }
            } catch (e) {
                console.error(e);
                statusEl.innerText = 'Synthesis Error';
                statusEl.className = 'absolute right-4 text-[10px] text-red-600 dark:text-red-400 font-bold uppercase tracking-wider bg-red-100 dark:bg-red-400/10 px-2 py-0.5 rounded border border-red-200 dark:border-red-400/20';
                alert("Synthesis Failed:\n" + e.message);
            }
        }

        function updateBreadcrumbUI() {
            const container = document.getElementById('breadcrumb-container');
            if (hierarchyStack.length <= 1) {
                container.classList.add('hidden');
                return;
            }
            container.classList.remove('hidden');
            container.innerHTML = '🏠 ';
            
            hierarchyStack.forEach((mod, idx) => {
                const btn = document.createElement('button');
                btn.className = 'hover:text-slate-900 dark:hover:text-white transition-colors cursor-pointer ' + 
                                (idx === hierarchyStack.length - 1 ? 'text-sky-600 dark:text-sky-400' : 'text-slate-500 dark:text-slate-500');
                btn.innerText = mod;
                btn.onclick = () => {
                    hierarchyStack = hierarchyStack.slice(0, idx); 
                    dagGraph = buildGraphFromYosys(fullNetlist, mod);
                    selectedNode = null; hoveredEdge = null; draggedEdge = null;
                    updateBreadcrumbUI();
                    fitCanvas();
                };
                container.appendChild(btn);
                
                if (idx < hierarchyStack.length - 1) {
                    const sep = document.createElement('span');
                    sep.innerText = '>';
                    sep.className = 'text-slate-400 dark:text-slate-600 mx-1';
                    container.appendChild(sep);
                }
            });
        }

        window.navigateUp = () => {
            if (hierarchyStack.length > 1) {
                hierarchyStack.pop(); 
                const parentMod = hierarchyStack.pop(); 
                dagGraph = buildGraphFromYosys(fullNetlist, parentMod);
                selectedNode = null; hoveredEdge = null; draggedEdge = null;
                updateBreadcrumbUI();
                fitCanvas();
            }
        };

        window.navigateDown = () => {
            const targetNodeId = selectedNode || hoveredNode;
            if (targetNodeId && dagGraph && fullNetlist) {
                const node = dagGraph.node(targetNodeId);
                if (node.type === 'instance') {
                    const modType = node.exactModuleType;
                    if (fullNetlist.modules[modType]) {
                        dagGraph = buildGraphFromYosys(fullNetlist, modType);
                        selectedNode = null; hoveredEdge = null; draggedEdge = null;
                        updateBreadcrumbUI();
                        fitCanvas();
                    } else {
                        alert("No internal hierarchy available for primitive: " + modType);
                    }
                } else {
                    alert("You can only travel down into an Instance block.");
                }
            } else {
                alert("Please click on a block to select it first, then click 'Down'.");
            }
        };

        function buildGraphFromYosys(netlist, targetModule) {
            const g = new dagre.graphlib.Graph({ compound: true, multigraph: true });
            g.setGraph({ rankdir: 'LR', align: 'UL', ranksep: 120, nodesep: 80, edgesep: 30 });
            g.setDefaultEdgeLabel(() => ({}));

            const modules = Object.keys(netlist.modules);
            if (modules.length === 0) throw new Error("No modules found in netlist");
            
            let topModuleName = targetModule;
            
            if (!topModuleName) {
                topModuleName = modules.find(m => netlist.modules[m].attributes && netlist.modules[m].attributes.top === 1);
                if (!topModuleName) {
                    const instantiated = new Set();
                    modules.forEach(m => {
                        const cells = netlist.modules[m].cells || {};
                        Object.values(cells).forEach(c => instantiated.add(c.type));
                    });
                    const rootModules = modules.filter(m => !instantiated.has(m));
                    
                    if (rootModules.length === 1) {
                        topModuleName = rootModules[0];
                    } else if (rootModules.length > 1) {
                        topModuleName = rootModules.sort((a, b) => {
                            const countA = Object.keys(netlist.modules[a].cells || {}).length;
                            const countB = Object.keys(netlist.modules[b].cells || {}).length;
                            return countB - countA;
                        })[0];
                    } else {
                        topModuleName = modules[modules.length - 1]; 
                    }
                }
            }
            
            if (hierarchyStack[hierarchyStack.length - 1] !== topModuleName) {
                hierarchyStack.push(topModuleName);
            }
            
            g.graph().name = topModuleName.replace('\\', ''); 

            const mod = netlist.modules[topModuleName];
            const bitDrivers = {}; 

            if (mod.ports) {
                for (const [portName, portData] of Object.entries(mod.ports)) {
                    const isInput = portData.direction === "input";
                    let portLabel = portName.replace('\\', '');
                    
                    if (portData.bits && portData.bits.length > 1) {
                        portLabel = `[${portData.bits.length - 1}:0] ${portLabel}`;
                    }
                    const dynamicWidth = Math.max(50, portLabel.length * 8 + 20);

                    g.setNode(portName, {
                        label: portLabel, type: isInput ? 'input' : 'output',
                        width: dynamicWidth, height: 36,
                        inPorts: isInput ? [] : [portName],
                        outPorts: isInput ? [portName] : [],
                        flipH: false, flipV: false
                    });
                    if (isInput) portData.bits.forEach(bit => { bitDrivers[bit] = { node: portName, portIdx: 0 }; });
                }
            }

            if (mod.cells) {
                for (const [cellName, cellData] of Object.entries(mod.cells)) {
                    let label = cellData.type;
                    let gateType = 'instance';
                    
                    const lType = label.toLowerCase();
                    if (lType.includes('nand')) gateType = 'nand';
                    else if (lType.includes('and')) gateType = 'and';
                    else if (lType.includes('xnor')) gateType = 'xnor';
                    else if (lType.includes('xor')) gateType = 'xor';
                    else if (lType.includes('nor')) gateType = 'nor';
                    else if (lType.includes('or')) gateType = 'or';
                    else if (lType.includes('not') || lType.includes('inv')) gateType = 'not';
                    else if (lType.includes('buf')) gateType = 'buf';

                    const cleanLabel = label.replace(/^\$_(.*)_$/g, '$1').replace(/^\$/g, '').replace('\\', '').toUpperCase();
                    const cleanName = cellData.hide_name ? '' : cellName.replace('\\', '');
                    const exactModuleType = cellData.type; 

                    const portDirs = cellData.port_directions || {};
                    if (!cellData.port_directions) {
                        for (const port of Object.keys(cellData.connections)) {
                            portDirs[port] = (port === 'Y' || port === 'Q' || port.includes('out') || port.includes('s') || port.includes('c') || port.includes('Sum') || port.includes('Carry')) ? 'output' : 'input';
                        }
                    }

                    const inPorts = Object.keys(portDirs).filter(p => portDirs[p] === 'input').sort();
                    const outPorts = Object.keys(portDirs).filter(p => portDirs[p] === 'output').sort();

                    let width = 120, height = 100;
                    if (gateType !== 'instance') { 
                        width = 60; height = 60; 
                    } else {
                        width = Math.max(120, cleanLabel.length * 10 + 20);
                        height = Math.max(100, Math.max(inPorts.length, outPorts.length) * 22 + 20);
                    }

                    g.setNode(cellName, {
                        label: cleanLabel, subLabel: cleanName, exactModuleType: exactModuleType,
                        type: gateType === 'instance' ? 'instance' : 'gate',
                        gateType: gateType, width: width, height: height,
                        inPorts: inPorts, outPorts: outPorts,
                        flipH: false, flipV: false
                    });

                    outPorts.forEach((port, idx) => {
                        cellData.connections[port].forEach(bit => { bitDrivers[bit] = { node: cellName, portIdx: idx }; });
                    });
                    cellData.resolved_port_directions = portDirs; 
                }
            }

            if (mod.cells) {
                for (const [cellName, cellData] of Object.entries(mod.cells)) {
                    const nodeData = g.node(cellName);
                    nodeData.inPorts.forEach((port, idx) => {
                        const driverGroups = {};
                        cellData.connections[port].forEach(bit => {
                            const driver = bitDrivers[bit];
                            if (driver && driver.node !== cellName) {
                                const key = `${driver.node}_${driver.portIdx}`;
                                if(!driverGroups[key]) driverGroups[key] = { node: driver.node, portIdx: driver.portIdx };
                            }
                        });
                        Object.values(driverGroups).forEach(grp => {
                            g.setEdge(grp.node, cellName, { 
                                srcPortIdx: grp.portIdx, tgtPortIdx: idx 
                            }, `${grp.node}_${cellName}_${port}_${grp.portIdx}`);
                        });
                    });
                }
            }
            
            if (mod.ports) {
                for (const [portName, portData] of Object.entries(mod.ports)) {
                    if (portData.direction === "output") {
                        const driverGroups = {};
                        portData.bits.forEach(bit => {
                            const driver = bitDrivers[bit];
                            if (driver) {
                                const key = `${driver.node}_${driver.portIdx}`;
                                if(!driverGroups[key]) driverGroups[key] = { node: driver.node, portIdx: driver.portIdx };
                            }
                        });
                        Object.values(driverGroups).forEach(grp => {
                            g.setEdge(grp.node, portName, { 
                                srcPortIdx: grp.portIdx, tgtPortIdx: 0
                            }, `${grp.node}_${portName}_${grp.portIdx}`);
                        });
                    }
                }
            }

            dagre.layout(g);
            return g;
        }

        // ==========================================
        // 4. SAFEPATH MANHATTAN RENDERING 
        // ==========================================
        function resizeCanvas() {
            canvas.width = wrapper.getBoundingClientRect().width;
            canvas.height = wrapper.getBoundingClientRect().height;
            if(dagGraph) renderGraph();
        }

        function drawArrowhead(ctx, x, y, angle, size = 6, color) {
            ctx.save(); ctx.fillStyle = color; ctx.translate(x, y); ctx.rotate(angle);
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-size, size/1.5); ctx.lineTo(-size, -size/1.5);
            ctx.closePath(); ctx.fill(); ctx.restore();
        }

        function drawGate(ctx, x, y, w, h, type, colors) {
            ctx.beginPath();
            ctx.fillStyle = colors.gateBg;
            ctx.strokeStyle = colors.nodeBorder;
            ctx.lineWidth = 2;

            if (type === 'and' || type === 'nand') {
                ctx.moveTo(x, y); ctx.lineTo(x + w/2, y);
                ctx.arc(x + w/2, y + h/2, h/2, -Math.PI/2, Math.PI/2);
                ctx.lineTo(x, y + h); ctx.closePath();
            } else if (type === 'or' || type === 'nor') {
                ctx.moveTo(x, y);
                ctx.quadraticCurveTo(x + w, y, x + w, y + h/2);
                ctx.quadraticCurveTo(x + w, y + h, x, y + h);
                ctx.quadraticCurveTo(x + w/4, y + h/2, x, y);
            } else if (type === 'xor' || type === 'xnor') {
                ctx.moveTo(x + 6, y);
                ctx.quadraticCurveTo(x + w, y, x + w, y + h/2);
                ctx.quadraticCurveTo(x + w, y + h, x + 6, y + h);
                ctx.quadraticCurveTo(x + w/4 + 6, y + h/2, x + 6, y);
                ctx.fill(); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(x - 2, y); ctx.quadraticCurveTo(x + w/4 - 2, y + h/2, x - 2, y + h);
                ctx.stroke(); return; 
            } else {
                ctx.moveTo(x, y); ctx.lineTo(x + w - (type==='not'?6:0), y + h/2); ctx.lineTo(x, y + h); ctx.closePath();
            }
            
            ctx.shadowColor = colors.shadow; ctx.shadowBlur = 8; ctx.shadowOffsetY = 4;
            ctx.fill(); ctx.shadowColor = 'transparent'; ctx.stroke();
            
            if(type === 'nand' || type === 'nor' || type === 'xnor' || type === 'not') {
                ctx.beginPath(); ctx.arc(x + w + 3, y + h/2, 4.5, 0, 2*Math.PI); 
                ctx.fillStyle = colors.gateBg; ctx.fill(); ctx.stroke();
            }
        }

        function renderGraph() {
            if (!dagGraph) return;
            const colors = getColors();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save(); ctx.translate(panX, panY); ctx.scale(scale, scale);

            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            let hasInternalNodes = false;
            
            dagGraph.nodes().forEach(v => {
                const node = dagGraph.node(v);
                if (node.type === 'gate' || node.type === 'instance') {
                    hasInternalNodes = true;
                    minX = Math.min(minX, node.x - node.width/2); minY = Math.min(minY, node.y - node.height/2);
                    maxX = Math.max(maxX, node.x + node.width/2); maxY = Math.max(maxY, node.y + node.height/2);
                }
            });

            if (hasInternalNodes) {
                const pad = 60;
                ctx.beginPath(); ctx.rect(minX - pad, minY - pad, (maxX - minX) + pad*2, (maxY - minY) + pad*2);
                ctx.fillStyle = colors.frameFill; ctx.fill();
                ctx.strokeStyle = colors.frame; ctx.lineWidth = 2; ctx.setLineDash([8, 6]); ctx.stroke(); ctx.setLineDash([]);
                ctx.fillStyle = colors.text; ctx.font = 'bold 18px "Inter"'; ctx.textAlign = 'center';
                ctx.fillText(dagGraph.graph().name || "Top Module", (minX + maxX)/2, minY - pad + 25);
            }

            dagGraph.edges().forEach(e => {
                const edgeObj = dagGraph.edge(e);
                // Initialize custom offsets for wire dragging
                edgeObj.customOffset = edgeObj.customOffset || 0;
                
                const srcNode = dagGraph.node(e.v);
                const tgtNode = dagGraph.node(e.w);
                if(!srcNode || !tgtNode) return;

                const srcFlip = srcNode.flipH || false;
                const tgtFlip = tgtNode.flipH || false;

                const bubbleOffset = (['nand','nor','xnor','not'].includes(srcNode.gateType)) ? 8 : 0;
                const startX = srcNode.x + (srcFlip ? -1 : 1) * (srcNode.width / 2 + bubbleOffset);
                let startY = srcNode.y;
                if (srcNode.outPorts && srcNode.outPorts.length > 0) {
                    let idx = srcNode.flipV ? (srcNode.outPorts.length - 1 - edgeObj.srcPortIdx) : edgeObj.srcPortIdx;
                    startY = (srcNode.y - srcNode.height/2) + (idx + 1) * (srcNode.height / (srcNode.outPorts.length + 1));
                }

                const endX = tgtNode.x + (tgtFlip ? 1 : -1) * (tgtNode.width / 2);
                let endY = tgtNode.y;
                if (tgtNode.inPorts && tgtNode.inPorts.length > 0) {
                    let idx = tgtNode.flipV ? (tgtNode.inPorts.length - 1 - edgeObj.tgtPortIdx) : edgeObj.tgtPortIdx;
                    endY = (tgtNode.y - tgtNode.height/2) + (idx + 1) * (tgtNode.height / (tgtNode.inPorts.length + 1));
                }

                const spreadX = (edgeObj.srcPortIdx || 0) * 6;
                const spreadY = (edgeObj.tgtPortIdx || 0) * 6;

                ctx.beginPath();
                ctx.moveTo(startX, startY);

                const outX = startX + (srcFlip ? -20 - spreadX : 20 + spreadX);
                ctx.lineTo(outX, startY);

                const inX = endX + (tgtFlip ? 20 + spreadX : -20 - spreadX);

                let hitSegment = null; // Stores coordinates for mouse hover/drag detection

                if (!srcFlip && !tgtFlip && outX < inX) {
                    let midX = outX + (inX - outX) / 2 + edgeObj.customOffset;
                    ctx.lineTo(midX, startY); ctx.lineTo(midX, endY);
                    hitSegment = { type: 'v', x: midX, y1: startY, y2: endY };
                } else if (srcFlip && tgtFlip && outX > inX) {
                    let midX = outX + (inX - outX) / 2 + edgeObj.customOffset;
                    ctx.lineTo(midX, startY); ctx.lineTo(midX, endY);
                    hitSegment = { type: 'v', x: midX, y1: startY, y2: endY };
                } else {
                    const goUp = startY >= endY;
                    const baseClearanceY = goUp ? (endY - 40 - spreadY) : (endY + 40 + spreadY);
                    let clearanceY = baseClearanceY + edgeObj.customOffset;
                    ctx.lineTo(outX, clearanceY); ctx.lineTo(inX, clearanceY); ctx.lineTo(inX, endY);
                    hitSegment = { type: 'h', y: clearanceY, x1: outX, x2: inX };
                }

                edgeObj._hitSegment = hitSegment; // Save to object for mouse events

                ctx.lineTo(endX, endY);
                
                // Highlight wire if hovered or dragged
                if (hoveredEdge === e || draggedEdge === e) {
                    ctx.strokeStyle = colors.wireHover; 
                    ctx.lineWidth = 3.5; 
                } else {
                    ctx.strokeStyle = colors.wire; 
                    ctx.lineWidth = 2.5; 
                }
                
                ctx.stroke();
                drawArrowhead(ctx, endX + (tgtFlip ? 1 : -1), endY, tgtFlip ? Math.PI : 0, 6, ctx.strokeStyle);
            });

            dagGraph.nodes().forEach(v => {
                const node = dagGraph.node(v);
                if (node.type === 'wire') return; 

                const w = node.width; const h = node.height;
                const w2 = w/2; const h2 = h/2;

                ctx.save();
                ctx.translate(node.x, node.y);
                ctx.scale(node.flipH ? -1 : 1, node.flipV ? -1 : 1);
                
                ctx.fillStyle = (node.type === 'input' || node.type === 'output') ? colors.ioBg : colors.gateBg;
                
                if (selectedNode === v) {
                    ctx.strokeStyle = colors.selected;
                    ctx.lineWidth = 3;
                } else if (hoveredNode === v) {
                    ctx.strokeStyle = colors.wireHover;
                    ctx.lineWidth = 2.5;
                } else {
                    ctx.strokeStyle = colors.nodeBorder;
                    ctx.lineWidth = 2;
                }

                if (node.type === 'gate') {
                    drawGate(ctx, -w2, -h2, w, h, node.gateType, colors);
                } else {
                    ctx.beginPath(); ctx.roundRect(-w2, -h2, w, h, 6);
                    ctx.shadowColor = colors.shadow; ctx.shadowBlur = 10; ctx.shadowOffsetY = 4;
                    ctx.fill(); ctx.shadowColor = 'transparent'; ctx.stroke();
                }

                ctx.fillStyle = colors.pin;
                if (node.inPorts && node.type !== 'input' && node.type !== 'output') {
                    node.inPorts.forEach((p, i) => {
                        const pinY = -h2 + (i + 1) * (h / (node.inPorts.length + 1));
                        ctx.fillRect(-w2 - 4, pinY - 2, 4, 4);
                    });
                }
                if (node.outPorts && node.type !== 'input' && node.type !== 'output') {
                    node.outPorts.forEach((p, i) => {
                        const pinY = -h2 + (i + 1) * (h / (node.outPorts.length + 1));
                        const xOffset = (['nand','nor','xnor','not'].includes(node.gateType)) ? 8 : 0;
                        ctx.fillRect(w2 + xOffset, pinY - 2, 4, 4);
                    });
                }

                ctx.restore();

                ctx.fillStyle = colors.text; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                if (node.type === 'input' || node.type === 'output') {
                    ctx.font = 'bold 14px "Inter"'; ctx.fillText(node.label, node.x, node.y);
                } else if (node.type === 'instance') {
                    ctx.font = 'bold 16px "Inter"'; ctx.fillText(node.label, node.x, node.y - 14);
                    ctx.font = '13px "JetBrains Mono"'; ctx.fillStyle = colors.nodeBorder; ctx.fillText(node.subLabel, node.x, node.y + 16);
                } else if (node.type === 'gate') {
                    ctx.font = 'bold 12px "JetBrains Mono"'; 
                    if (hoveredNode === v || selectedNode === v) ctx.fillText(node.subLabel, node.x, node.y - 25);
                }
            });

            ctx.restore();
        }

        // ==========================================
        // 5. INTERACTIVITY & WIRE DRAGGING
        // ==========================================
        
        wrapper.addEventListener('dblclick', (e) => {
            navigateDown();
        });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace') {
                navigateUp();
                return;
            }
            if (e.key === 'Enter') {
                navigateDown();
                return;
            }
            
            const activeNode = selectedNode || hoveredNode;
            if (activeNode && dagGraph) {
                const node = dagGraph.node(activeNode);
                if (e.key.toLowerCase() === 'h') { node.flipH = !node.flipH; renderGraph(); }
                if (e.key.toLowerCase() === 'v') { node.flipV = !node.flipV; renderGraph(); }
            }
        });

        wrapper.addEventListener('wheel', (e) => { 
            e.preventDefault(); 
            zoomCanvas(e.deltaY > 0 ? 0.9 : 1.1, e.clientX - wrapper.offsetLeft, e.clientY - wrapper.offsetTop); 
        });

        window.zoomCanvas = (amt, cx = canvas.width/2, cy = canvas.height/2) => { 
            const nS = scale * amt; 
            if (nS >= 0.2 && nS <= 5) { 
                panX = cx - (cx - panX) * amt; 
                panY = cy - (cy - panY) * amt; 
                scale = nS; 
                renderGraph(); 
            } 
        }

        window.fitCanvas = () => { 
            if(!dagGraph) return;
            const graphW = dagGraph.graph().width || 800; 
            const graphH = dagGraph.graph().height || 600; 
            const cw = canvas.width; 
            const ch = canvas.height;
            scale = Math.min((cw - 160) / graphW, (ch - 160) / graphH); 
            if (scale > 1.5) scale = 1.5;
            panX = (cw - (graphW * scale)) / 2; 
            panY = (ch - (graphH * scale)) / 2; 
            renderGraph(); 
        }
        
        let isDraggingCanvas = false;
        let startDragX = 0, startDragY = 0;
        let draggedNode = null;
        let dragOffsetX = 0, dragOffsetY = 0;

        wrapper.addEventListener('mousedown', (e) => { 
            const rect = canvas.getBoundingClientRect();
            const mx = (e.clientX - rect.left - panX) / scale;
            const my = (e.clientY - rect.top - panY) / scale;
            
            let clickedNode = null;
            if(dagGraph) {
                const nodes = dagGraph.nodes();
                for(let i = nodes.length - 1; i >= 0; i--) {
                    const v = nodes[i];
                    const node = dagGraph.node(v); 
                    if (node.type === 'wire') continue;
                    
                    const nx = node.x - node.width / 2; 
                    const ny = node.y - node.height / 2;
                    if (mx >= nx && mx <= nx + node.width && my >= ny && my <= ny + node.height) {
                        clickedNode = v;
                        break;
                    }
                }
            }

            if (clickedNode) {
                draggedNode = clickedNode;
                selectedNode = clickedNode; 
                const node = dagGraph.node(draggedNode);
                dragOffsetX = mx - node.x;
                dragOffsetY = my - node.y;
                wrapper.style.cursor = 'grabbing';
                renderGraph(); 
            } else if (hoveredEdge) {
                // START DRAGGING WIRE
                draggedEdge = hoveredEdge;
                const edge = dagGraph.edge(draggedEdge);
                dragEdgeStartOffset = edge.customOffset || 0;
                startDragX = mx;
                startDragY = my;
            } else {
                isDraggingCanvas = true; 
                selectedNode = null; 
                startDragX = e.clientX - panX; 
                startDragY = e.clientY - panY; 
                wrapper.style.cursor = 'grab';
                renderGraph(); 
            }
        });

        window.addEventListener('mouseup', () => { 
            isDraggingCanvas = false; 
            draggedNode = null;
            draggedEdge = null;
            wrapper.style.cursor = 'default';
            renderGraph();
        });

        wrapper.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mx = (e.clientX - rect.left - panX) / scale;
            const my = (e.clientY - rect.top - panY) / scale;

            if (isDraggingCanvas) { 
                panX = e.clientX - startDragX; 
                panY = e.clientY - startDragY; 
                renderGraph(); 
            } else if (draggedNode) {
                const node = dagGraph.node(draggedNode);
                node.x = mx - dragOffsetX;
                node.y = my - dragOffsetY;
                
                node.x = Math.round(node.x / 20) * 20;
                node.y = Math.round(node.y / 20) * 20;

                renderGraph();
            } else if (draggedEdge) {
                // UPDATE WIRE CUSTOM OFFSET
                const edge = dagGraph.edge(draggedEdge);
                const seg = edge._hitSegment;
                if (seg.type === 'v') {
                    edge.customOffset = dragEdgeStartOffset + (mx - startDragX);
                } else {
                    edge.customOffset = dragEdgeStartOffset + (my - startDragY);
                }
                renderGraph();
            } else {
                if(!dagGraph) return;
                let foundNode = null;
                let foundEdge = null;
                
                // 1. Check Node Hit
                dagGraph.nodes().forEach(v => {
                    const node = dagGraph.node(v); 
                    if (node.type === 'wire') return;
                    const nx = node.x - node.width / 2; 
                    const ny = node.y - node.height / 2;
                    if (mx >= nx && mx <= nx + node.width && my >= ny && my <= ny + node.height) {
                        foundNode = v;
                        
                        const wrapperRect = wrapper.getBoundingClientRect();
                        tooltip.style.left = (e.clientX - wrapperRect.left + 15) + 'px'; 
                        tooltip.style.top = (e.clientY - wrapperRect.top + 15) + 'px';
                        
                        const hlColor = isDarkMode ? '#fde047' : '#eab308';
                        const subColor = isDarkMode ? '#22d3ee' : '#0284c7';

                        let tipText = `<span style="color:${hlColor}; font-weight:bold;">Ref:</span> ${node.subLabel || node.label}<br><span style="color:${hlColor}; font-weight:bold;">Type:</span> ${node.type === 'gate' ? node.gateType.toUpperCase() : 'Module'}`;
                        if (node.type === 'instance') tipText += `<br><span style="color:${subColor}; font-size:9px;">(Select and click 'Down' to enter)</span>`;
                        
                        tooltip.innerHTML = tipText;
                        tooltip.style.display = 'block';
                    }
                });

                // 2. Check Edge Segment Hit (Only if no node is found)
                if (!foundNode) {
                    dagGraph.edges().forEach(e => {
                        const edgeObj = dagGraph.edge(e);
                        const seg = edgeObj._hitSegment;
                        if (seg) {
                            if (seg.type === 'v') {
                                if (Math.abs(mx - seg.x) < 8 && my >= Math.min(seg.y1, seg.y2) - 5 && my <= Math.max(seg.y1, seg.y2) + 5) foundEdge = e;
                            } else {
                                if (Math.abs(my - seg.y) < 8 && mx >= Math.min(seg.x1, seg.x2) - 5 && mx <= Math.max(seg.x1, seg.x2) + 5) foundEdge = e;
                            }
                        }
                    });
                }
                
                let needsRender = false;

                // Update Hover States
                if (foundNode !== hoveredNode) { hoveredNode = foundNode; needsRender = true; }
                if (foundEdge !== hoveredEdge) { hoveredEdge = foundEdge; needsRender = true; }
                
                // Update Cursor
                if (hoveredNode) {
                    wrapper.style.cursor = 'pointer';
                } else if (hoveredEdge) {
                    const seg = dagGraph.edge(hoveredEdge)._hitSegment;
                    wrapper.style.cursor = seg.type === 'v' ? 'col-resize' : 'row-resize';
                    tooltip.style.display = 'none';
                } else {
                    wrapper.style.cursor = 'default';
                    tooltip.style.display = 'none';
                }

                if (needsRender) renderGraph();
            }
        });
    </script>
</body>
</html>
